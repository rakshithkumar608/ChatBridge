<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBridge</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
    <div class="header">
        <span class="logo">⚡ ChatBridge</span>
        <button id="settings-btn" title="Settings">⚙️</button>
    </div>

    <!-- Tabs -->
     <div class="tabs">
        <button class="tab active" data-tab="capture">Capture</button>
        <button class="tab" data-tab="sessions">Sessions</button>
        <button class="tab" data-tab="enhance">Enhance</button>
     </div>

     <!--Capture Tab -->
     <div class="tab-content active" id="tab-capture">
         <div id="provider-badge" class="badge">Detecting...</div>
         <p class="hint">Capture the current chat and save it for transfer.</p>
         <button id="capture-btn" class="btn primary">📸 Capture Chat</button>
         <div class="options-row">
             <label><input type="checkbox" id="compress-opt" /> Compress long chats</label>
         </div>
         <div id="capture-status" class="status hidden"></div>
     </div>

     <!-- Sessions Tab -->
     <div class="tab-content hidden" id="tab-sessions">
         <div id="sessions-list"><p class="empty">No saved sessions yet.</p></div>
     </div>

     <!-- Enhance Tab -->
     <div class="tab-content hidden" id="tab-enhance">
         <textarea id="enhance-input" placeholder="Paste your prompt here..." rows="5"></textarea>
         <select class="target-select" data-id="${s.id}">
  <option value="">Transfer to...</option>
  <optgroup label="Anthropic">
    <option value="claude">Claude (new account)</option>
  </optgroup>
  <optgroup label="OpenAI">
    <option value="chatgpt">ChatGPT</option>
  </optgroup>
  <optgroup label="Google">
    <option value="gemini">Gemini</option>
  </optgroup>
  <optgroup label="xAI">
    <option value="grok">Grok</option>
  </optgroup>
  <optgroup label="Other">
    <option value="groq">Groq</option>
    <option value="deepseek">DeepSeek</option>
    <option value="perplexity">Perplexity</option>
    <option value="mistral">Mistral (Le Chat)</option>
    <option value="cohere">Cohere (Coral)</option>
    <option value="meta">Meta AI</option>
    <option value="copilot">Microsoft Copilot</option>
    <option value="poe">Poe</option>
  </optgroup>
</select>
         <button id="enhance-btn" class="btn secondary">✨ Enhance Prompt</button>
         <div id="enhanced-output" class="output hidden"></div>
         <button id="copy-enhanced" class="btn ghost hidden">📋 Copy</button>
     </div>
