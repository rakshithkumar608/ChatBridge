<!DOCTYPE html>
<html>
<head>
  <title>ChatBridge Settings</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 24px; color: #6c47ff; }
    label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #444; }
    input, select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    button { background: #6c47ff; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .hint { font-size: 11px; color: #aaa; margin-top: -12px; margin-bottom: 16px; }
    #save-status { margin-top: 12px; color: green; font-size: 13px; }
  </style>
</head>
<body>
  <h1>⚡ ChatBridge Settings</h1>
  <label>Default compression threshold (messages)</label>
  <input type="number" id="compress-threshold" value="20" min="5" max="100" />
  <p class="hint">Compress sessions with more than this many messages</p>

  <label>Auto-submit after injection</label>
  <select id="auto-submit">
    <option value="false">Off — let me review first (recommended)</option>
    <option value="true">On — send immediately</option>
  </select>

  <label>Session retention (days)</label>
  <input type="number" id="retention-days" value="30" min="1" max="365" />

  <button id="save-btn">Save Settings</button>
  <div id="save-status"></div>

  <script src="options.js"></script>
</body>
</html>
